; SAXBLE — M5Stack Tab5 (ESP32-P4) bring-up tests
;
; The Tab5 is a different beast from the Cardputer:
;   * MCU  : ESP32-P4 (dual RISC-V, 32MB PSRAM, 16MB flash) — NO built-in radio.
;   * Radio: ESP32-C6-MINI-1U co-processor, reached over ESP-Hosted (SDIO).
;            BLE/Wi-Fi therefore run on the C6 and tunnel to the P4.
;   * Screen: 5" 1280x720 IPS, capacitive multi-touch (GT911).
;
; This sub-project is intentionally NOT the full SAXBLE app. It is two minimal
; bring-up tests, each its own firmware, to prove the two things we are unsure
; about on this board BEFORE porting the app:
;
;   1) tab5-touch-test : does the 5" touchscreen + drawing work?  (low risk)
;   2) tab5-ble-test   : can the P4 act as a BLE *central* through the C6 and
;                        talk to the SAX-D encoder?               (the real risk)
;
; Build / flash one at a time:
;   pio run -e tab5-touch-test -t upload && pio device monitor
;   pio run -e tab5-ble-test   -t upload && pio device monitor

[platformio]
; Touch first — it's the safe one to confirm the toolchain + display are good.
default_envs = tab5-touch-test

[env]
; The official PlatformIO "espressif32" platform does not (yet) ship the
; ESP32-P4 + Arduino-core-3.x toolchain, so we use the community "pioarduino"
; fork. This pinned release carries the P4 build and the ESP-Hosted (C6) BLE
; fixes. If BLE fails to initialise on your unit, try bumping this tag to the
; newest pioarduino release (see github.com/pioarduino/platform-espressif32).
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.39
framework = arduino

; The Tab5 has no dedicated PlatformIO board yet; the generic P4 eval board
; definition matches the chip. M5Unified auto-detects the actual Tab5 at runtime.
board = esp32-p4-evboard
board_build.mcu = esp32p4
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = huge_app.csv

monitor_speed = 115200
upload_speed = 1500000

build_flags =
    -DBOARD_HAS_PSRAM
    ; Level 2 = warnings/errors only. Level 3 (info) floods the monitor with the
    ; core's per-advertisement "handleGAPEvent: Updated advertiser" lines, which
    ; interleave with our own output. The SDIO/ESP-Hosted errors we care about
    ; are logged at error/warn level, so they still show.
    -DCORE_DEBUG_LEVEL=2
    ; USB-CDC so Serial prints reach the monitor over the single USB-C port.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_deps =
    ; Display + touch + power for the Tab5. Tracked from git: Tab5 support is
    ; recent, so the released versions may lag the board definition.
    https://github.com/M5Stack/M5Unified.git
    https://github.com/M5Stack/M5GFX.git
    ; NOTE: the BLE test deliberately uses the BLE library bundled with the
    ; Arduino core (BLEDevice.h), NOT NimBLE-Arduino. The core's bundled stack
    ; is the one that received the ESP32-P4 / ESP-Hosted fixes; NimBLE-Arduino
    ; has historically failed to compile on the P4 (missing on-chip esp_bt.h).

; --- Test 1: touchscreen -----------------------------------------------------
[env:tab5-touch-test]
build_src_filter = -<*> +<touch_test.cpp>

; --- Test 2: BLE central -> SAX-D encoder ------------------------------------
[env:tab5-ble-test]
build_src_filter = -<*> +<ble_test.cpp>
