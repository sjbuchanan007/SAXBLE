; SAXBLE — SAX-D alarm setup tool for M5Stack Cardputer ADV
;
; The Cardputer ADV is based on the M5Stamp S3A (ESP32-S3FN8). It acts as a BLE
; *central* (client): it connects to the SAX-D encoder exactly like the "BLE
; Terminal" phone app does, then writes setup commands over the encoder's serial
; (Nordic UART) service.
;
; Build:   pio run
; Flash:   pio run -t upload
; Monitor: pio device monitor

[platformio]
default_envs = cardputer-adv

[env:cardputer-adv]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 1500000

build_flags =
    -DCORE_DEBUG_LEVEL=2
    ; Cardputer ADV / Stamp S3A has 8MB flash
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ; Keyboard + display + power helpers for the Cardputer family.
    ; NOTE: the ADV is new (2026). If the keyboard or display init misbehaves,
    ; bump M5Unified/M5GFX to their latest releases — the ADV pinout landed there.
    m5stack/M5Cardputer @ ^1.0.3
    ; Lightweight BLE stack. Pinned to the 1.4.x API used by this firmware;
    ; the 2.x line changed several signatures (notably notify callbacks).
    h2zero/NimBLE-Arduino @ ^1.4.3
